<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PizzaControl — Painel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: none; /* Escondido até admin ser verificado */
        }

        /* HEADER */
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 20px 30px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px;
        }
        .admin-header-left {
            display: flex; align-items: center; gap: 14px;
        }
        .admin-header-left .admin-icon {
            font-size: 2rem;
        }
        .admin-header-left h1 {
            font-size: 1.4rem; font-weight: 800;
            background: linear-gradient(135deg, #fff, #e94560);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-header-left p {
            font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 2px;
        }
        .admin-header-right {
            display: flex; align-items: center; gap: 12px;
        }
        .admin-email {
            font-size: 0.8rem; color: rgba(255,255,255,0.5);
        }
        .btn-voltar, .btn-sair {
            padding: 8px 18px; border-radius: 10px; border: none;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.3s;
        }
        .btn-voltar {
            background: rgba(255,255,255,0.08); color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-voltar:hover { background: rgba(255,255,255,0.15); }
        .btn-sair {
            background: rgba(233,69,96,0.15); color: #e94560;
            border: 1px solid rgba(233,69,96,0.3);
        }
        .btn-sair:hover { background: rgba(233,69,96,0.25); }

        /* STATS CARDS */
        .admin-stats {
            display: flex; gap: 16px; padding: 24px 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1; min-width: 160px;
            background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; padding: 20px;
            text-align: center;
        }
        .stat-card .stat-icon { font-size: 1.6rem; margin-bottom: 8px; }
        .stat-card .stat-value {
            font-size: 2rem; font-weight: 800; margin-bottom: 4px;
        }
        .stat-card .stat-label {
            font-size: 0.75rem; color: rgba(255,255,255,0.4);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .stat-ativos .stat-value { color: #4caf50; }
        .stat-vencidos .stat-value { color: #e94560; }
        .stat-total .stat-value { color: #ff9800; }
        .stat-receita .stat-value { color: #42a5f5; }

        /* SEARCH + TABLE CONTAINER */
        .admin-content {
            padding: 0 30px 30px;
        }
        .admin-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
        }
        .admin-toolbar h2 {
            font-size: 1.1rem; font-weight: 700; color: rgba(255,255,255,0.8);
        }
        .search-box {
            display: flex; align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 0 14px; gap: 8px;
        }
        .search-box span { color: rgba(255,255,255,0.3); }
        .search-box input {
            background: transparent; border: none; outline: none;
            color: #fff; font-family: 'Inter', sans-serif;
            font-size: 0.85rem; padding: 10px 0; width: 200px;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.25); }

        /* TABLE */
        .table-wrapper {
            background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; overflow: hidden;
        }
        table {
            width: 100%; border-collapse: collapse;
        }
        thead th {
            text-align: left; padding: 14px 16px;
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s;
        }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody tr:last-child { border-bottom: none; }
        tbody td {
            padding: 14px 16px; font-size: 0.85rem;
            color: rgba(255,255,255,0.75);
        }

        /* BADGES */
        .badge {
            display: inline-block; padding: 4px 12px;
            border-radius: 8px; font-size: 0.7rem;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-ativo {
            background: rgba(76,175,80,0.15); color: #66bb6a;
            border: 1px solid rgba(76,175,80,0.3);
        }
        .badge-vencido {
            background: rgba(233,69,96,0.15); color: #e94560;
            border: 1px solid rgba(233,69,96,0.3);
        }
        .badge-plano {
            background: rgba(66,165,245,0.1); color: #64b5f6;
            border: 1px solid rgba(66,165,245,0.2);
        }

        /* LOADING */
        .admin-loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 20px; color: rgba(255,255,255,0.5);
        }
        .admin-spinner {
            width: 36px; height: 36px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #e94560; border-radius: 50%;
            animation: adminSpin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes adminSpin { to { transform: rotate(360deg); } }

        /* EMPTY STATE */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: rgba(255,255,255,0.3);
        }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 12px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .admin-header { padding: 16px 20px; }
            .admin-stats { padding: 16px 20px; }
            .admin-content { padding: 0 20px 20px; }
            .stat-card { min-width: 140px; padding: 14px; }
            .stat-card .stat-value { font-size: 1.5rem; }
            .table-wrapper { overflow-x: auto; }
            table { min-width: 700px; }
        }
        @media (max-width: 480px) {
            .admin-header-left h1 { font-size: 1.1rem; }
            .search-box input { width: 140px; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="admin-header">
        <div class="admin-header-left">
            <span class="admin-icon">👑</span>
            <div>
                <h1>Painel Administrativo</h1>
                <p>Gestão de assinaturas PizzaControl</p>
            </div>
        </div>
        <div class="admin-header-right">
            <span class="admin-email" id="adminEmail"></span>
            <button class="btn-voltar" onclick="window.location.href='app.html'">← Voltar</button>
            <button class="btn-sair" id="btnSair">Sair</button>
        </div>
    </header>

    <!-- STATS -->
    <div class="admin-stats">
        <div class="stat-card stat-total">
            <div class="stat-icon">👥</div>
            <div class="stat-value" id="statTotal">—</div>
            <div class="stat-label">Total Clientes</div>
        </div>
        <div class="stat-card stat-ativos">
            <div class="stat-icon">✅</div>
            <div class="stat-value" id="statAtivos">—</div>
            <div class="stat-label">Ativos</div>
        </div>
        <div class="stat-card stat-vencidos">
            <div class="stat-icon">⚠️</div>
            <div class="stat-value" id="statVencidos">—</div>
            <div class="stat-label">Vencidos</div>
        </div>
        <div class="stat-card stat-receita">
            <div class="stat-icon">💰</div>
            <div class="stat-value" id="statReceita">—</div>
            <div class="stat-label">Receita Mensal Est.</div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="admin-content">
        <div class="admin-toolbar">
            <h2>📋 Clientes Cadastrados</h2>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por e-mail..." oninput="filtrarTabela()">
            </div>
        </div>
        <div class="table-wrapper">
            <div class="admin-loading" id="loadingState">
                <div class="admin-spinner"></div>
                <p>Carregando clientes...</p>
            </div>
            <table id="tabelaClientes" style="display:none;">
                <thead>
                    <tr>
                        <th>E-mail</th>
                        <th>Pizzaria</th>
                        <th>Plano</th>
                        <th>Último Pgto</th>
                        <th>Vencimento</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display:none;">
                <span>📭</span>
                <p>Nenhum cliente encontrado.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDT8kvJBD5Uo0giOpZLBP50zUAjSemmjCs",
            authDomain: "pizzacontrol-marllon.firebaseapp.com",
            projectId: "pizzacontrol-marllon",
            storageBucket: "pizzacontrol-marllon.firebasestorage.app",
            messagingSenderId: "413127374575",
            appId: "1:413127374575:web:79f3dc78834502727ecd1a"
        };

        // Inicializar Firebase
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
        } catch (e) {
            app = initializeApp(firebaseConfig, 'admin');
        }
        auth = getAuth(app);
        db = getFirestore(app);

        // ============================================================
        // ADMIN LOCK — Lista de e-mails autorizados
        // ============================================================
        const admins = ['smarllon950@gmail.com'];

        // Sair
        document.getElementById('btnSair').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('index.html');
                return;
            }

            // Verificar se é admin
            if (!admins.includes(user.email)) {
                console.warn('🚫 Acesso negado. Usuário não é admin.');
                window.location.replace('app.html');
                return;
            }

            // É admin! Mostra a tela
            document.body.style.display = 'block';
            document.getElementById('adminEmail').textContent = user.email;

            // Carregar dados
            await carregarClientes();
        });

        // ============================================================
        // CARREGAR CLIENTES DO FIRESTORE
        // ============================================================
        async function carregarClientes() {
            try {
                const querySnapshot = await getDocs(collection(db, 'usuarios'));
                const clientes = [];

                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    dados.uid = doc.id;
                    clientes.push(dados);
                });

                renderizarTabela(clientes);
                atualizarStats(clientes);

            } catch (error) {
                console.error('Erro ao carregar clientes:', error);
                document.getElementById('loadingState').innerHTML = 
                    '<p style="color:#e94560;">❌ Erro ao carregar dados. Verifique as permissões do Firestore.</p>';
            }
        }

        // ============================================================
        // RENDERIZAR TABELA
        // ============================================================
        window._todosClientes = [];

        function renderizarTabela(clientes) {
            window._todosClientes = clientes;
            const corpo = document.getElementById('corpoTabela');
            const loading = document.getElementById('loadingState');
            const tabela = document.getElementById('tabelaClientes');
            const empty = document.getElementById('emptyState');

            loading.style.display = 'none';

            if (clientes.length === 0) {
                empty.style.display = 'block';
                tabela.style.display = 'none';
                return;
            }

            tabela.style.display = 'table';
            corpo.innerHTML = '';

            // Ordenar: vencidos primeiro
            clientes.sort((a, b) => {
                const statusA = calcularStatus(a);
                const statusB = calcularStatus(b);
                if (statusA === 'Vencido' && statusB !== 'Vencido') return -1;
                if (statusA !== 'Vencido' && statusB === 'Vencido') return 1;
                return 0;
            });

            clientes.forEach(cliente => {
                const tr = document.createElement('tr');

                const email = cliente.email || '—';
                const pizzaria = cliente.nome_pizzaria || cliente.nomePizzaria || '—';
                const plano = cliente.plano || '—';
                const ultimoPgto = cliente.ultimoPagamento ? `R$ ${Number(cliente.ultimoPagamento).toFixed(2)}` : '—';
                const vencimento = formatarData(cliente.data_vencimento);
                const status = calcularStatus(cliente);

                tr.innerHTML = `
                    <td style="font-weight:600; color:#fff;">${email}</td>
                    <td>${pizzaria}</td>
                    <td><span class="badge badge-plano">${plano}</span></td>
                    <td>${ultimoPgto}</td>
                    <td>${vencimento}</td>
                    <td><span class="badge ${status === 'Ativo' ? 'badge-ativo' : 'badge-vencido'}">${status}</span></td>
                `;
                corpo.appendChild(tr);
            });
        }

        // ============================================================
        // ATUALIZAR CARDS DE STATS
        // ============================================================
        function atualizarStats(clientes) {
            const total = clientes.length;
            let ativos = 0;
            let vencidos = 0;
            let receitaMensal = 0;

            clientes.forEach(c => {
                const status = calcularStatus(c);
                if (status === 'Ativo') {
                    ativos++;
                    // Estimar receita mensal
                    if (c.plano === 'anual') {
                        receitaMensal += 598.80 / 12;
                    } else {
                        receitaMensal += 59.90;
                    }
                } else {
                    vencidos++;
                }
            });

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAtivos').textContent = ativos;
            document.getElementById('statVencidos').textContent = vencidos;
            document.getElementById('statReceita').textContent = `R$ ${receitaMensal.toFixed(0)}`;
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function calcularStatus(cliente) {
            if (!cliente.data_vencimento) return 'Vencido';

            let dataVenc;
            if (cliente.data_vencimento.toDate) {
                dataVenc = cliente.data_vencimento.toDate().getTime();
            } else {
                dataVenc = new Date(cliente.data_vencimento).getTime();
            }

            return Date.now() > dataVenc ? 'Vencido' : 'Ativo';
        }

        function formatarData(campo) {
            if (!campo) return '—';

            let data;
            if (campo.toDate) {
                data = campo.toDate();
            } else {
                data = new Date(campo);
            }

            if (isNaN(data.getTime())) return '—';

            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const ano = data.getFullYear();
            return `${dia}/${mes}/${ano}`;
        }

        // Busca / Filtro por e-mail
        window.filtrarTabela = function() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = window._todosClientes.filter(c => 
                (c.email && c.email.toLowerCase().includes(termo)) ||
                (c.nome_pizzaria && c.nome_pizzaria.toLowerCase().includes(termo))
            );
            renderizarTabela(filtrados);
        };
    </script>
</body>
</html>
